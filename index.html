<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First API Project</title>
    <style>
      /* A little bit of CSS to make it look nice */
      body {
        font-family: sans-serif;
        text-align: center;
        margin-top: 50px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
      }
      button:hover {
        background-color: #0056b3;
      }
      img {
        max-width: 300px;
        margin-top: 20px;
        border-radius: 10px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <h1>Radom Pokemon Generator</h1>

    <button id="dogButton">Fetch a Pokemon!</button>

    <div id="imageContainer"></div>

    <script>
      // --- JAVASCRIPT --- //

      // Step A: Grab the HTML elements we need to manipulate
      const button = document.getElementById("dogButton");
      const imageContainer = document.getElementById("imageContainer");

      // Step B: Create the async function
      async function getDogPicture() {
        try {
          // Change button text so the user knows it's working
          button.innerText = "Loading...";
          const randomId = Math.floor(Math.random() * 1000) + 1;
          // 1. Send the "waiter" (fetch) to the API
          const response = await fetch(
            `https://pokeapi.co/api/v2/pokemon/${randomId}`,
          );

          // 2. Read the ticket: tell JavaScript to parse the response as JSON
          const data = await response.json();

          const pokemonName = data.name.toUpperCase();
          const pokemonPic = data.sprites.front_default;
          console.log(data);

          // 3. Put the food on the table: inject the image into the HTML
          imageContainer.innerHTML = `<img src="${pokemonPic}" alt="A cute random Pokemon">
          <h3>${pokemonName}</h3>`;
        } catch (error) {
          // This block catches any errors (like if your internet drops)
          console.error("Uh oh, something went wrong!", error);
          imageContainer.innerHTML = `<p style="color: red;">Failed to load Pokemon. Try again!</p>`;
        } finally {
          // Reset the button text no matter what happens
          button.innerText = "Fetch a Pokemon!";
        }
      }

      // Step C: Tell the button to run our function when clicked
      button.addEventListener("click", getDogPicture);
    </script>
  </body>
</html>
